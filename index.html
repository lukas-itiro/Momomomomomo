<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área Exclusiva</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card" id="card">
    <div class="hearts-bg" id="heartsBg"></div>
    <span class="deco-top" aria-hidden="true">♥ ♡ ♥</span>
    <span class="deco-top2" aria-hidden="true">♥ ♡ ♥</span>
    <div class="icon-heart" aria-hidden="true">♥</div>
    <p class="card-title">Área exclusiva</p>
    <p class="card-sub">Digite seu código de acesso para continuar</p>
    <label class="field-label" for="codeInput">Código de acesso</label>
    <input class="code-input" id="codeInput" type="password" placeholder="••••••••" maxlength="20" autocomplete="off" />
    <button class="btn" id="submitBtn">
      <span aria-hidden="true">♥</span> Entrar
    </button>
    <div class="msg" id="msg" role="alert"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
